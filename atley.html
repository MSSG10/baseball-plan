<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atley's Baseball Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1520;--accent:#d62828;--gold:#f4a900;--gold-light:#ffd166;--cream:#f0ebe0;--white:#fff;--gray:#7a90a8;--green:#2ecc71;--green-dark:#239954;--orange:#e67e22;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px);pointer-events:none;z-index:0;}

.sticky-header{position:sticky;top:0;z-index:100;background:rgba(12,21,32,.97);border-bottom:1px solid rgba(255,255,255,.1);padding:10px 16px 12px;backdrop-filter:blur(8px);}
.hero-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--white);text-shadow:3px 3px 0 #a61e1e;letter-spacing:.02em;}
.hero-meta{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);}
.nav-link{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);text-decoration:none;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 10px;white-space:nowrap;}
.nav-link:hover{color:var(--gold);border-color:var(--gold);}

/* STATS */
.stats-row{display:flex;gap:6px;align-items:stretch;margin-bottom:8px;flex-wrap:wrap;}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:6px 8px;text-align:center;flex:1;min-width:50px;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:var(--gold);}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);margin-top:1px;}
.stars-card{background:rgba(244,169,0,.1);border-color:rgba(244,169,0,.25);flex:1.8;}
.star-inner{display:flex;align-items:center;justify-content:center;gap:5px;}
.star-ico{font-size:18px;}
.star-cols{display:flex;gap:8px;align-items:center;}
.star-col{text-align:center;}
.star-val{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--gold);}
.star-lbl-sm{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(244,169,0,.5);}
.star-div{width:1px;height:24px;background:rgba(244,169,0,.2);}
.streak-card{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);}
.streak-card .stat-num{color:#ff6b6b;}
.streak-card .stat-lbl{color:rgba(255,107,107,.6);}
.streak-bonus{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;color:#ff6b6b;letter-spacing:.06em;text-transform:uppercase;}

/* BONUS CARDS */
.bonus-row{display:flex;gap:6px;margin-bottom:8px;}
.bonus-card{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.2);border-radius:8px;padding:6px 10px;flex:1;display:flex;align-items:center;gap:8px;}
.bonus-btns{display:flex;gap:4px;}
.bonus-btn{border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.bonus-plus{background:var(--green);color:#0c1520;}
.bonus-minus{background:rgba(255,255,255,.12);color:var(--gray);font-size:10px;}
.bonus-plus:active,.bonus-minus:active{transform:scale(.9);}
.bonus-info{flex:1;}
.bonus-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--cream);letter-spacing:.04em;}
.bonus-stat{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(46,204,113,.6);letter-spacing:.04em;}
.speed-card{background:rgba(91,170,240,.07);border:1px solid rgba(91,170,240,.2);}
.speed-card .bonus-name{color:#5baaf0;}
.speed-card .bonus-stat{color:rgba(91,170,240,.6);}
.speed-btn-plus{background:#5baaf0;color:#0c1520;}

/* DUAL PROGRESS */
.dual-prog{margin-bottom:4px;}
.prog-labels{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.prog-lbl-orange{color:var(--orange);}
.prog-lbl-green{color:var(--green);}
.dual-track{position:relative;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.fill-orange{position:absolute;top:0;left:0;height:100%;background:var(--orange);opacity:.4;border-radius:5px;transition:width .4s;}
.fill-green{position:absolute;top:0;left:0;height:100%;background:var(--green);border-radius:5px;transition:width .4s;z-index:1;}

/* SHOUT */
.shout-overlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s;}
.shout-overlay.show{opacity:1;}
.shout-text{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,10vw,72px);color:var(--white);text-shadow:4px 4px 0 #a61e1e,0 0 40px rgba(214,40,40,.5);text-align:center;padding:0 20px;animation:shout-in .6s ease forwards;}
@keyframes shout-in{0%{transform:scale(.3);opacity:0;}50%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;}}

/* PAGE */
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 60px;}
.week-section{margin-bottom:16px;border-radius:14px;border:1px solid rgba(255,255,255,.09);overflow:hidden;background:rgba(255,255,255,.03);}
.week-section.current-week{border-color:var(--accent);}
.week-header{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.07);gap:8px;flex-wrap:wrap;}
.week-label-big{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--white);}
.week-dates{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gray);letter-spacing:.04em;}
.week-now-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:#0c1520;border-radius:10px;padding:2px 8px;}
.week-stars-badge{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--gold);white-space:nowrap;}
.week-done-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--green);color:#0c1520;border-radius:10px;padding:2px 8px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:12px 16px 8px;}
@media(max-width:500px){.days-grid{grid-template-columns:repeat(4,1fr);}}
.day-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);}
.day-date{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(122,144,168,.55);}
.tap-btn{width:52px;height:52px;border-radius:10px;border:2px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0c1520;transition:transform .15s,background .18s,border-color .18s;-webkit-tap-highlight-color:transparent;user-select:none;}
.tap-btn.done{background:var(--green);border-color:var(--green-dark);}
.tap-btn.done-streak{background:#ff6b6b;border-color:#cc4444;}
.tap-btn.locked-past{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);cursor:not-allowed;opacity:.3;color:transparent;}
.tap-btn.locked-future{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.04);cursor:not-allowed;opacity:.18;color:transparent;}
.tap-btn.today-btn{border-color:var(--accent);box-shadow:0 0 0 3px rgba(214,40,40,.3);}
.tap-btn:active:not(.locked-past):not(.locked-future){transform:scale(.88);}
.week-prog{margin:0 16px 10px;}
.week-prog-track{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.ex-section{padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.06);}
.ex-section-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
@media(max-width:500px){.ex-grid{grid-template-columns:1fr;}}
.ex-item{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;background:rgba(255,255,255,.03);border-radius:6px;font-size:11.5px;line-height:1.4;}
.ex-item.ex-carry{background:rgba(244,169,0,.08);}
.ex-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-move{background:#5baaf0;}.dot-power{background:var(--accent);}
.ex-name{flex:1;color:var(--cream);font-weight:500;}
.ex-sets{font-size:10px;color:var(--gray);white-space:nowrap;flex-shrink:0;}
.ex-cue{display:block;font-size:10px;color:var(--gray);font-style:italic;margin-top:1px;font-weight:400;}
.carry-tag{font-size:9px;background:rgba(244,169,0,.2);color:var(--gold-light);border-radius:3px;padding:0 4px;margin-left:3px;font-weight:600;vertical-align:middle;white-space:nowrap;}
/* SPEED DRILL IN WEEK */
.speed-drill-row{padding:8px 16px 12px;border-top:1px solid rgba(91,170,240,.1);display:flex;align-items:center;gap:8px;}
.speed-drill-icon{font-size:16px;}
.speed-drill-info{flex:1;}
.speed-drill-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:#5baaf0;letter-spacing:.04em;}
.speed-drill-desc{font-size:10px;color:var(--gray);font-style:italic;}
.speed-drill-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;color:rgba(91,170,240,.5);white-space:nowrap;}

.fw-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.spark{position:absolute;width:12px;height:12px;border-radius:50%;animation:spark-fly 2.5s ease-out forwards;}
@keyframes spark-fly{0%{transform:translate(0,0) scale(1);opacity:1;}30%{opacity:1;transform:translate(calc(var(--dx)*.3),calc(var(--dy)*.3)) scale(1.3);}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
.celebration{display:none;text-align:center;background:rgba(46,204,113,.08);border:1px solid var(--green);border-radius:14px;padding:20px;margin-bottom:20px;}
.celebration.show{display:block;}
.cel-text{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:.04em;}
.cel-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,.5);margin-top:4px;}
/* PIN */
.pin-section{margin-top:40px;border-top:1px solid rgba(255,255,255,.07);padding-top:24px;text-align:center;}
.pin-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18);margin-bottom:12px;}
.pin-display{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.2em;color:rgba(255,255,255,.12);height:44px;margin-bottom:12px;}
.pin-display.active{color:var(--gold);}
.pin-display.error{color:#e24b4a;}
.pin-display.success{color:var(--green);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto;}
.pin-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.35);font-family:'Bebas Neue',sans-serif;font-size:26px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.pin-btn:active{transform:scale(.9);background:rgba(255,255,255,.12);color:var(--white);}
.pin-clear{font-size:16px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:rgba(255,255,255,.25);}
#pin-msg{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.25);margin-top:10px;min-height:18px;letter-spacing:.06em;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(.95)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease forwards;}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
.shake{animation:shake .35s ease forwards;}
</style>
</head>
<body>
<div class="fw-container" id="fw"></div>
<div class="shout-overlay" id="shout"><div class="shout-text" id="shout-text"></div></div>

<div class="sticky-header">
  <div class="hero-row">
    <div><div class="hero-name">Atley</div><div class="hero-meta">Age 9 &middot; Jun 1 &ndash; Aug 23 &middot; 3-5 lb Dumbbells</div></div>
    <a class="nav-link" href="perin.html">&rarr; Perin</a>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="hdr-done">0</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat-card stars-card">
      <div class="star-inner">
        <div class="star-ico">&#11088;</div>
        <div class="star-cols">
          <div class="star-col"><div class="star-val" id="hdr-wk-stars">0</div><div class="star-lbl-sm">This week</div></div>
          <div class="star-div"></div>
          <div class="star-col"><div class="star-val" id="hdr-tot-stars">0</div><div class="star-lbl-sm">Total</div></div>
        </div>
      </div>
    </div>
    <div class="stat-card streak-card">
      <div class="stat-num" id="hdr-streak">0</div>
      <div class="stat-lbl">Streak</div>
      <div class="streak-bonus" id="streak-bonus"></div>
    </div>
    <div class="stat-card"><div class="stat-num" id="hdr-pct">0%</div><div class="stat-lbl">Complete</div></div>
  </div>
  <div class="bonus-row">
    <div class="bonus-card">
      <div class="bonus-btns"><button class="bonus-btn bonus-plus" onclick="addBonus('bucket',5,this)">&#9918;+5</button><button class="bonus-btn bonus-minus" onclick="removeBonus('bucket',5,this)">&#8722;5</button></div>
      <div class="bonus-info"><div class="bonus-name">Bucket of Balls</div><div class="bonus-stat" id="bucket-stat">0 &middot; 0&#11088;</div></div>
    </div>
    <div class="bonus-card speed-card">
      <div class="bonus-btns"><button class="bonus-btn speed-btn-plus" onclick="addBonus('speed',2,this)">&#9889;+2</button><button class="bonus-btn bonus-minus" onclick="removeBonus('speed',2,this)">&#8722;2</button></div>
      <div class="bonus-info"><div class="bonus-name" id="speed-name">Speed Drill</div><div class="bonus-stat" id="speed-stat">0 &middot; 0&#11088;</div></div>
    </div>
  </div>
  <div class="dual-prog">
    <div class="prog-labels">
      <span class="prog-lbl-orange" id="orange-lbl">83 days left</span>
      <span class="prog-lbl-green" id="green-lbl">0 sessions done</span>
    </div>
    <div class="dual-track">
      <div class="fill-orange" id="fill-orange" style="width:0%"></div>
      <div class="fill-green" id="fill-green" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="page">
  <div id="celebration" class="celebration">
    <div style="font-size:40px;margin-bottom:6px;">&#127942;</div>
    <div class="cel-text">All 83 sessions complete!</div>
    <div class="cel-sub">You went the whole summer, Atley. Incredible.</div>
  </div>
  <div id="weeks-container"></div>
  <div class="pin-section">
    <div class="pin-label">Parent reset</div>
    <div class="pin-display" id="pin-display">&#8226;&#8226;&#8226;&#8226;</div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button><button class="pin-btn" onclick="pinPress('2')">2</button><button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button><button class="pin-btn" onclick="pinPress('5')">5</button><button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button><button class="pin-btn" onclick="pinPress('8')">8</button><button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-clear" onclick="pinClear()">CLR</button><button class="pin-btn" onclick="pinPress('0')">0</button>
    </div>
    <div id="pin-msg"></div>
  </div>
</div>

function todayStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function addDays(s,n){var p=s.split('-');var d=new Date(+p[0],+p[1]-1,+p[2],12,0,0);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtShort(s){var p=s.split('-');var d=new Date(+p[0],+p[1]-1,+p[2],12,0,0);return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();}
function daysBetween(a,b){var d1=new Date(+a.split('-')[0],+a.split('-')[1]-1,+a.split('-')[2],12,0,0);var d2=new Date(+b.split('-')[0],+b.split('-')[1]-1,+b.split('-')[2],12,0,0);return Math.round((d2-d1)/86400000);}
function dayKey(w,d){return 'w'+w+'d'+d;}
function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
var state=loadState();

function currentWeekIdx(){
  var t=todayStr();
  for(var w=0;w<WEEKS.length;w++){if(t>=WEEKS[w].start&&t<=WEEK_ENDS[w])return w;}
  return t<WEEKS[0].start?0:WEEKS.length-1;
}

/* STREAK CALC: count consecutive days ending at yesterday or today that have checks */
function calcStreak(){
  var t=todayStr();
  var streak=0;
  var checkDate=t;
  /* start from today, go backwards */
  while(true){
    var found=false;
    for(var w=0;w<WEEKS.length;w++){
      for(var d=0;d<WEEKS[w].days;d++){
        if(addDays(WEEKS[w].start,d)===checkDate&&state[dayKey(w,d)]){found=true;break;}
      }
      if(found)break;
    }
    if(!found)break;
    streak++;
    checkDate=addDays(checkDate,-1);
    if(checkDate<SUMMER_START)break;
  }
  return streak;
}
function isStreakDay(w,d){
  /* A day gets streak bonus (20 stars) if the streak at that point was >=4 */
  var dateStr=addDays(WEEKS[w].start,d);
  if(!state[dayKey(w,d)])return false;
  /* count consecutive days ending at dateStr */
  var streak=0;var cd=dateStr;
  while(true){
    var found=false;
    for(var ww=0;ww<WEEKS.length;ww++){
      for(var dd=0;dd<WEEKS[ww].days;dd++){
        if(addDays(WEEKS[ww].start,dd)===cd&&state[dayKey(ww,dd)]){found=true;break;}
      }
      if(found)break;
    }
    if(!found)break;
    streak++;cd=addDays(cd,-1);
    if(cd<SUMMER_START)break;
  }
  return streak>=4;
}

/* SHOUT */
function showShout(dayIdx){
  var overlay=document.getElementById('shout');
  var txt=document.getElementById('shout-text');
  txt.textContent=SHOUTS[dayIdx]||SHOUTS[0];
  overlay.classList.add('show');
  txt.style.animation='none';
  void txt.offsetWidth;
  txt.style.animation='shout-in .6s ease forwards';
  setTimeout(function(){overlay.classList.remove('show');},2500);
}

/* TOGGLE */
function toggle(w,d,el){
  var today=todayStr();
  var dateStr=addDays(WEEKS[w].start,d);
  if(dateStr!==today)return;
  var k=dayKey(w,d);
  state[k]=!state[k];
  saveState(state);
  if(state[k]){
    el.classList.add('done');el.textContent='\u2713';
    el.classList.add('pop');el.addEventListener('animationend',function(){el.classList.remove('pop');},{once:true});
    fireworks(el);
    showShout(d);
  }else{
    el.classList.remove('done','done-streak');el.textContent='';
  }
  updateAll();
}

/* BONUS */
function addBonus(type,pts,btn){
  state['_'+type]=(state['_'+type]||0)+1;saveState(state);
  btn.classList.add('pop');btn.addEventListener('animationend',function(){btn.classList.remove('pop');},{once:true});
  fireworks(btn);updateAll();
}
function removeBonus(type,pts,btn){
  if(!state['_'+type]||state['_'+type]<=0)return;
  state['_'+type]--;saveState(state);
  btn.classList.add('pop');btn.addEventListener('animationend',function(){btn.classList.remove('pop');},{once:true});
  updateAll();
}

/* UPDATE */
function updateAll(){
  var cwi=currentWeekIdx();
  var today=todayStr();
  var totalDone=0,wkStars=0,totalStars=0;
  var buckets=state._bucket||0,speeds=state._speed||0;
  for(var w=0;w<WEEKS.length;w++){
    var wd=0;var wStars=0;
    for(var d=0;d<WEEKS[w].days;d++){
      if(state[dayKey(w,d)]){
        wd++;totalDone++;
        var pts=isStreakDay(w,d)?STREAK_STARS:STARS_PER;
        totalStars+=pts;
        wStars+=pts;
        if(w===cwi)wkStars+=pts;
        /* color streak buttons */
        var btn=document.getElementById('btn-'+w+'-'+d);
        if(btn){
          if(isStreakDay(w,d))btn.classList.add('done-streak');
          else btn.classList.remove('done-streak');
        }
      }
    }
    var pf=document.getElementById('wpf-'+w);
    if(pf)pf.style.width=Math.round(wd/WEEKS[w].days*100)+'%';
    var wsb=document.getElementById('wsb-'+w);
    if(wsb)wsb.textContent=wStars+' \u2b50';
    var wdb=document.getElementById('wdb-'+w);
    if(wdb)wdb.style.display=wd===WEEKS[w].days?'inline':'none';
  }
  var bonusStars=buckets*5+speeds*2;
  totalStars+=bonusStars;wkStars+=bonusStars;
  var streak=calcStreak();
  var pct=Math.round(totalDone/TOTAL*100);
  document.getElementById('hdr-done').textContent=totalDone;
  document.getElementById('hdr-wk-stars').textContent=wkStars;
  document.getElementById('hdr-tot-stars').textContent=totalStars;
  document.getElementById('hdr-streak').textContent=streak;
  document.getElementById('streak-bonus').textContent=streak>=3?'\u26a1 1.5x next!':'';
  document.getElementById('hdr-pct').textContent=pct+'%';
  document.getElementById('bucket-stat').textContent=buckets+' \u00b7 '+(buckets*5)+'\u2b50';
  document.getElementById('speed-stat').textContent=speeds+' \u00b7 '+(speeds*2)+'\u2b50';
  /* speed drill name for this week */
  var sd=SPEED_DRILLS[cwi]||SPEED_DRILLS[0];
  document.getElementById('speed-name').textContent=sd.icon+' '+sd.name;
  /* dual progress bar */
  var daysElapsed=daysBetween(SUMMER_START,today)+1;
  if(daysElapsed<0)daysElapsed=0;
  var totalSummerDays=daysBetween(SUMMER_START,SUMMER_END)+1;
  var orangePct=Math.min(100,Math.round(daysElapsed/totalSummerDays*100));
  var greenPct=Math.round(totalDone/TOTAL*100);
  document.getElementById('fill-orange').style.width=orangePct+'%';
  document.getElementById('fill-green').style.width=greenPct+'%';
  document.getElementById('orange-lbl').textContent=(totalSummerDays-daysElapsed)+' days left';
  document.getElementById('green-lbl').textContent=totalDone+' sessions done';
  document.getElementById('celebration').classList.toggle('show',totalDone===TOTAL);
}

function buildWeeks(){
  var container=document.getElementById('weeks-container');
  var today=todayStr();var cwi=currentWeekIdx();
  WEEKS.forEach(function(wk,w){
    var isCurrent=w===cwi;
    var wd=0;for(var d=0;d<wk.days;d++)if(state[dayKey(w,d)])wd++;
    var sec=document.createElement('div');
    sec.className='week-section'+(isCurrent?' current-week':'');
    sec.id='week-'+w;
    var hdr=document.createElement('div');hdr.className='week-header';
    hdr.innerHTML='<div><div class="week-label-big">'+wk.label+'</div><div class="week-dates">'+wk.dates+'</div></div>'
      +(isCurrent?'<span class="week-now-badge">This week</span>':'')
      +'<span class="week-stars-badge" id="wsb-'+w+'">0 &#11088;</span>'
      +'<span class="week-done-badge" id="wdb-'+w+'" style="display:none">&#10003; Done</span>';
    sec.appendChild(hdr);
    var grid=document.createElement('div');grid.className='days-grid';
    for(var d=0;d<wk.days;d++){
      var dateStr=addDays(wk.start,d);
      var isPast=dateStr<today,isToday=dateStr===today,isFuture=dateStr>today;
      var isDone=!!state[dayKey(w,d)];
      var cls='tap-btn';
      if(isDone)cls+=' done';
      else if(isPast)cls+=' locked-past';
      else if(isFuture)cls+=' locked-future';
      if(isToday&&!isDone)cls+=' today-btn';
      var box=document.createElement('div');box.className='day-box';
      box.innerHTML='<div class="day-name">'+DAY_NAMES[d]+'</div><div class="day-date">'+fmtShort(dateStr)+'</div><button class="'+cls+'" id="btn-'+w+'-'+d+'" onclick="toggle('+w+','+d+',this)" aria-label="'+wk.label+' '+DAY_NAMES[d]+'">'+(isDone?'\u2713':'')+'</button>';
      grid.appendChild(box);
    }
    sec.appendChild(grid);
    var wp=document.createElement('div');wp.className='week-prog';
    wp.innerHTML='<div class="week-prog-track"><div class="week-prog-fill" id="wpf-'+w+'" style="width:0%"></div></div>';
    sec.appendChild(wp);
    /* exercises */
    var exDiv=document.createElement('div');exDiv.className='ex-section';
    var exs=EXERCISES[w];var moveH='',powerH='';
    exs.forEach(function(ex){
      var tag=ex.carry?'<span class="carry-tag">carry-over</span>':'';
      var c2='ex-item'+(ex.carry?' ex-carry':'');
      var dot=ex.type==='move'?'dot-move':'dot-power';
      var h='<div class="'+c2+'"><span class="ex-dot '+dot+'"></span><span class="ex-name">'+ex.name+tag+'<span class="ex-cue">'+ex.cue+'</span></span><span class="ex-sets">'+ex.sets+'</span></div>';
      if(ex.type==='move')moveH+=h;else powerH+=h;
    });
    exDiv.innerHTML='<div class="ex-section-title">Movement skills</div><div class="ex-grid">'+moveH+'</div><div class="ex-section-title" style="margin-top:8px;">Rotational power</div><div class="ex-grid">'+powerH+'</div>';
    sec.appendChild(exDiv);
    /* speed drill */
    var sd=SPEED_DRILLS[w]||SPEED_DRILLS[0];
    var sdRow=document.createElement('div');sdRow.className='speed-drill-row';
    sdRow.innerHTML='<div class="speed-drill-icon">'+sd.icon+'</div><div class="speed-drill-info"><div class="speed-drill-name">Speed Drill: '+sd.name+'</div><div class="speed-drill-desc">'+sd.desc+'</div></div><div class="speed-drill-badge">+2 &#11088;</div>';
    sec.appendChild(sdRow);
    container.appendChild(sec);
  });
}

/* PIN */
var pinEntry='';
function pinPress(digit){
  if(pinEntry.length>=4)return;
  pinEntry+=digit;
  var disp=document.getElementById('pin-display');
  disp.textContent='\u2022'.repeat(pinEntry.length)+'\u00b7'.repeat(4-pinEntry.length);
  disp.className='pin-display active';
  if(pinEntry.length===4)setTimeout(checkPin,120);
}
function pinClear(){pinEntry='';var d=document.getElementById('pin-display');d.textContent='\u2022\u2022\u2022\u2022';d.className='pin-display';document.getElementById('pin-msg').textContent='';}
function checkPin(){
  var disp=document.getElementById('pin-display');
  var msg=document.getElementById('pin-msg');
  if(pinEntry==='5400'){
    var today=todayStr();var cwi=currentWeekIdx();
    for(var d=0;d<WEEKS[cwi].days;d++){if(addDays(WEEKS[cwi].start,d)===today)delete state[dayKey(cwi,d)];}
    saveState(state);disp.className='pin-display success';disp.textContent='OK';msg.textContent="Today cleared";refreshButtons();updateAll();
  }else if(pinEntry==='4110'){
    var cwi2=currentWeekIdx();
    for(var d2=0;d2<WEEKS[cwi2].days;d2++)delete state[dayKey(cwi2,d2)];
    saveState(state);disp.className='pin-display success';disp.textContent='OK';msg.textContent="This week cleared";refreshButtons();updateAll();
  }else if(pinEntry==='9110'){
    var bk=state._bucket||0,sp=state._speed||0;state={};state._bucket=bk;state._speed=sp;
    saveState(state);disp.className='pin-display success';disp.textContent='OK';msg.textContent="All sessions cleared";refreshButtons();updateAll();
  }else{
    disp.className='pin-display error';disp.textContent='NOPE';
    disp.classList.add('shake');disp.addEventListener('animationend',function(){disp.classList.remove('shake');},{once:true});
    msg.textContent="Wrong code";
  }
  pinEntry='';
  setTimeout(function(){disp.className='pin-display';disp.textContent='\u2022\u2022\u2022\u2022';msg.textContent='';},1800);
}
function refreshButtons(){
  var today=todayStr();
  for(var w=0;w<WEEKS.length;w++){
    for(var d=0;d<WEEKS[w].days;d++){
      var btn=document.getElementById('btn-'+w+'-'+d);
      if(!btn)continue;
      var dateStr=addDays(WEEKS[w].start,d);
      var isDone=!!state[dayKey(w,d)];
      btn.className='tap-btn';
      if(isDone){btn.classList.add('done');btn.textContent='\u2713';}
      else{btn.textContent='';if(dateStr<today)btn.classList.add('locked-past');else if(dateStr>today)btn.classList.add('locked-future');if(dateStr===today)btn.classList.add('today-btn');}
    }
  }
}

buildWeeks();updateAll();
setTimeout(function(){var el=document.getElementById('week-'+currentWeekIdx());if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},250);
</script>
