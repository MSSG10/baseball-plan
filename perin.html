<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perin's Baseball Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1520;--accent:#00a878;--gold:#f4a900;--gold-light:#ffd166;--cream:#f0ebe0;--white:#fff;--gray:#7a90a8;--green:#2ecc71;--green-dark:#239954;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px);pointer-events:none;z-index:0;}
.sticky-header{position:sticky;top:0;z-index:100;background:rgba(12,21,32,.97);border-bottom:1px solid rgba(255,255,255,.1);padding:10px 16px 12px;backdrop-filter:blur(8px);}
.hero-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--white);text-shadow:3px 3px 0 #007a57;letter-spacing:.02em;}
.hero-meta{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);}
.nav-link{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);text-decoration:none;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 10px;white-space:nowrap;}
.nav-link:hover{color:var(--gold);border-color:var(--gold);}
.stats-row{display:flex;gap:8px;align-items:stretch;margin-bottom:8px;flex-wrap:wrap;}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:7px 10px;text-align:center;flex:1;min-width:55px;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--gold);}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:1px;}
.stars-card{background:rgba(244,169,0,.1);border-color:rgba(244,169,0,.25);flex:2;}
.star-inner{display:flex;align-items:center;justify-content:center;gap:6px;}
.star-ico{font-size:20px;}
.star-cols{display:flex;gap:10px;align-items:center;}
.star-col{text-align:center;}
.star-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--gold);}
.star-lbl-sm{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(244,169,0,.55);}
.star-div{width:1px;height:28px;background:rgba(244,169,0,.2);}
.bucket-card{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.2);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:1.5;min-width:90px;}
.bucket-btn{background:var(--green);border:none;border-radius:6px;color:#0c1520;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.bucket-btn:active{transform:scale(.93);}
.bucket-stat{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:rgba(46,204,113,.7);letter-spacing:.04em;text-align:center;}
.prog-label{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);margin-bottom:4px;}
.prog-label span:last-child{color:var(--gold);}
.prog-bar-wrap{background:rgba(255,255,255,.07);border-radius:4px;height:7px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width .4s ease;}
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 60px;}
.week-section{margin-bottom:16px;border-radius:14px;border:1px solid rgba(255,255,255,.09);overflow:hidden;background:rgba(255,255,255,.03);}
.week-section.current-week{border-color:var(--accent);}
.week-header{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.07);gap:8px;flex-wrap:wrap;}
.week-label-big{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--white);}
.week-dates{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gray);letter-spacing:.04em;}
.week-now-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:#0c1520;border-radius:10px;padding:2px 8px;}
.week-stars-badge{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--gold);white-space:nowrap;}
.week-done-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--green);color:#0c1520;border-radius:10px;padding:2px 8px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:12px 16px 8px;}
@media(max-width:500px){.days-grid{grid-template-columns:repeat(4,1fr);}}
.day-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);}
.day-date{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(122,144,168,.55);}
.tap-btn{width:52px;height:52px;border-radius:10px;border:2px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0c1520;transition:transform .15s,background .18s,border-color .18s;-webkit-tap-highlight-color:transparent;user-select:none;}
.tap-btn.done{background:var(--green);border-color:var(--green-dark);color:#0c1520;}
.tap-btn.locked-past{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);cursor:not-allowed;opacity:.3;color:transparent;}
.tap-btn.locked-future{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.04);cursor:not-allowed;opacity:.18;color:transparent;}
.tap-btn.today-btn{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,168,120,.3);}
.tap-btn:active:not(.locked-past):not(.locked-future){transform:scale(.88);}
.week-prog{margin:0 16px 10px;}
.week-prog-track{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.ex-section{padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.06);}
.ex-section-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
@media(max-width:500px){.ex-grid{grid-template-columns:1fr;}}
.ex-item{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;background:rgba(255,255,255,.03);border-radius:6px;font-size:11.5px;line-height:1.4;}
.ex-item.ex-carry{background:rgba(244,169,0,.08);}
.ex-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-move{background:#5baaf0;}.dot-power{background:var(--accent);}
.ex-name{flex:1;color:var(--cream);font-weight:500;}
.ex-sets{font-size:10px;color:var(--gray);white-space:nowrap;flex-shrink:0;}
.ex-cue{display:block;font-size:10px;color:var(--gray);font-style:italic;margin-top:1px;font-weight:400;}
.carry-tag{font-size:9px;background:rgba(244,169,0,.2);color:var(--gold-light);border-radius:3px;padding:0 4px;margin-left:3px;font-weight:600;vertical-align:middle;white-space:nowrap;}
.fw-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.spark{position:absolute;width:7px;height:7px;border-radius:50%;animation:spark-fly .75s ease-out forwards;}
@keyframes spark-fly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
.celebration{display:none;text-align:center;background:rgba(46,204,113,.08);border:1px solid var(--green);border-radius:14px;padding:20px;margin-bottom:20px;}
.celebration.show{display:block;}
.cel-text{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:.04em;}
.cel-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,.5);margin-top:4px;}
/* PIN PAD */
.pin-section{margin-top:40px;border-top:1px solid rgba(255,255,255,.07);padding-top:24px;text-align:center;}
.pin-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:12px;}
.pin-display{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.2em;color:rgba(255,255,255,.15);height:44px;margin-bottom:12px;transition:color .2s;}
.pin-display.active{color:var(--gold);}
.pin-display.error{color:#e24b4a;}
.pin-display.success{color:var(--green);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto;}
.pin-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.4);font-family:'Bebas Neue',sans-serif;font-size:26px;padding:12px;cursor:pointer;transition:background .15s,color .15s,transform .1s;-webkit-tap-highlight-color:transparent;}
.pin-btn:active{transform:scale(.9);background:rgba(255,255,255,.12);color:var(--white);}
.pin-clear{grid-column:1;font-size:16px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:rgba(255,255,255,.3);}
.pin-zero{grid-column:2;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(.95)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease forwards;}
.shake{animation:shake .35s ease forwards;}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
</style>
</head>
<body>
<div class="fw-container" id="fw"></div>
<div class="sticky-header">
  <div class="hero-row">
    <div><div class="hero-name">Perin</div><div class="hero-meta">Age 7 &middot; Jun 1 &ndash; Aug 23 &middot; 2-3 lb Dumbbells</div></div>

      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-clear" onclick="pinClear()">CLR</button>
      <button class="pin-btn pin-zero" onclick="pinPress('0')">0</button>

    <div id="pin-msg" style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.3);margin-top:10px;min-height:18px;letter-spacing:.06em;"></div>
  </div>
</div>

"Scoop toss simulation", "sets": "4\u00d78/side", "cue": "Maximum hip speed \u2014 let it rip", "type": "power", "carry": false}, {"name": "Lateral lunge", "sets": "4\u00d78/side", "cue": "Drive hard off the planted foot", "type": "move", "carry": true}, {"name": "Full swing pattern review", "sets": "4\u00d78/side", "cue": "This is what summer built \u2014 own it", "type": "power", "carry": true}, {"name": "Plank\u2192rotation", "sets": "3\u00d710/side", "cue": "Strong and slow \u2014 last week of this", "type": "move", "carry": true}, {"name": "Assisted pull-up", "sets": "4\u00d78", "cue": "Push for 5 reps with no help", "type": "move", "carry": false}], [{"name": "Full swing pattern review", "sets": "3\u00d76/side", "cue": "Feel the whole summer in this swing", "type": "power", "carry": false}, {"name": "Goblet squat\u2192press", "sets": "3\u00d76", "cue": "Clean, controlled \u2014 celebrate your form", "type": "move", "carry": true}, {"name": "Scoop toss simulation", "sets": "3\u00d76/side", "cue": "Explosive but smooth \u2014 you earned this", "type": "power", "carry": true}, {"name": "Pallof press (band)", "sets": "3\u00d78/side", "cue": "Strong core \u2014 you built this all summer", "type": "power", "carry": false}, {"name": "Lateral lunge", "sets": "3\u00d76/side", "cue": "Final week \u2014 make every rep count", "type": "move", "carry": false}, {"name": "Assisted pull-up", "sets": "3\u00d76", "cue": "How many can you do without help now?", "type": "move", "carry": false}]];
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TOTAL=83;
const STARS_PER=13;
const BUCKET_STARS=5;
const COLORS=['#f4a900','#ffd166','#2ecc71','#5baaf0','#ff6b6b','#fff','#ff9f43'];

/* ── LOCAL DATE (no UTC shift) ── */
function todayStr(){
  const n=new Date();
  const y=n.getFullYear();
  const m=String(n.getMonth()+1).padStart(2,'0');
  const d=String(n.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function addDays(s,n){
  const parts=s.split('-');
  const d=new Date(+parts[0],+parts[1]-1,+parts[2],12,0,0);
  d.setDate(d.getDate()+n);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function fmtShort(s){
  const parts=s.split('-');
  const d=new Date(+parts[0],+parts[1]-1,+parts[2]);
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();
}
function dayKey(w,d){return 'w'+w+'d'+d;}
function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
let state=loadState();

function currentWeekIdx(){
  const t=todayStr();
  /* precomputed end dates to avoid addDays timezone issues */
  const ENDS=['2025-06-08','2025-06-15','2025-06-22','2025-06-29','2025-07-06','2025-07-13','2025-07-20','2025-07-27','2025-08-03','2025-08-10','2025-08-17','2025-08-23'];
  for(let w=0;w<WEEKS.length;w++){
    if(t>=WEEKS[w].start && t<=ENDS[w]) return w;
  }
  return t<WEEKS[0].start ? 0 : WEEKS.length-1;
}

/* ── FIREWORKS ── */
function fireworks(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const c=document.getElementById('fw');
  for(let i=0;i<22;i++){
    const s=document.createElement('div');
    s.className='spark';
    const a=Math.random()*Math.PI*2;
    const dist=60+Math.random()*100;
    s.style.left=cx+'px';s.style.top=cy+'px';
    s.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
    s.style.setProperty('--dx',Math.cos(a)*dist+'px');
    s.style.setProperty('--dy',(Math.sin(a)*dist-30)+'px');
    s.style.animationDelay=Math.random()*.15+'s';
    s.style.animationDuration=(.55+Math.random()*.45)+'s';
    c.appendChild(s);
    s.addEventListener('animationend',()=>s.remove());
  }
}

/* ── TOGGLE ── */
function toggle(w,d,el){
  const today=todayStr();
  const dateStr=addDays(WEEKS[w].start,d);
  /* only allow today or earlier days in current/past weeks */
  if(dateStr!==today) return;
  const k=dayKey(w,d);
  state[k]=!state[k];
  saveState(state);
  if(state[k]){
    el.classList.add('done');
    el.textContent='✓';
    el.classList.add('pop');
    el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});
    fireworks(el);
  } else {
    el.classList.remove('done');
    el.textContent='';
  }
  updateAll();
}

/* ── BUCKET ── */
function logBucket(btn){
  state._buckets=(state._buckets||0)+1;
  saveState(state);
  btn.classList.add('pop');
  btn.addEventListener('animationend',()=>btn.classList.remove('pop'),{once:true});
  fireworks(btn);
  updateAll();
}


/* __ UNDO BUCKET __ */
function undoBucket(btn){
  if(!state._buckets||state._buckets<=0) return;
  state._buckets=state._buckets-1;
  saveState(state);
  btn.classList.add('pop');
  btn.addEventListener('animationend',function(){btn.classList.remove('pop')},{once:true});
  updateAll();
}

/* ── UPDATE STATS ── */
function updateAll(){
  const cwi=currentWeekIdx();
  let totalDone=0,wkSessionsDone=0,totalStars=0,wkStars=0;
  const buckets=state._buckets||0;
  for(let w=0;w<WEEKS.length;w++){
    let wd=0;
    for(let d=0;d<WEEKS[w].days;d++){
      if(state[dayKey(w,d)]){
        wd++;totalDone++;totalStars+=STARS_PER;
        if(w===cwi){wkSessionsDone++;wkStars+=STARS_PER;}
      }
    }
    const pf=document.getElementById('wpf-'+w);
    if(pf) pf.style.width=Math.round(wd/WEEKS[w].days*100)+'%';
    const wsb=document.getElementById('wsb-'+w);
    if(wsb) wsb.textContent=wd*STARS_PER+' ⭐';
    const wdb=document.getElementById('wdb-'+w);
    if(wdb) wdb.style.display=wd===WEEKS[w].days?'inline':'none';
  }
  const bonus=buckets*BUCKET_STARS;
  totalStars+=bonus; wkStars+=bonus;
  const pct=Math.round(totalDone/TOTAL*100);
  document.getElementById('hdr-done').textContent=totalDone;
  document.getElementById('hdr-wk-stars').textContent=wkStars;
  document.getElementById('hdr-tot-stars').textContent=totalStars;
  document.getElementById('hdr-pct').textContent=pct+'%';
  document.getElementById('hdr-prog-fill').style.width=pct+'%';
  document.getElementById('hdr-prog-lbl').textContent=totalDone+' / '+TOTAL+' sessions';
  document.getElementById('bucket-stat').textContent=buckets+' bucket'+(buckets!==1?'s':'')+' · '+bonus+'⭐';
  document.getElementById('celebration').classList.toggle('show',totalDone===TOTAL);
}

/* ── BUILD WEEKS ── */
function buildWeeks(){
  const container=document.getElementById('weeks-container');
  const today=todayStr();
  const cwi=currentWeekIdx();
  WEEKS.forEach((wk,w)=>{
    const isCurrent=w===cwi;
    let wd=0;
    for(let d=0;d<wk.days;d++) if(state[dayKey(w,d)]) wd++;
    const sec=document.createElement('div');
    sec.className='week-section'+(isCurrent?' current-week':'');
    sec.id='week-'+w;
    const hdr=document.createElement('div');
    hdr.className='week-header';
    hdr.innerHTML='<div><div class="week-label-big">'+wk.label+'</div><div class="week-dates">'+wk.dates+'</div></div>'
      +(isCurrent?'<span class="week-now-badge">This week</span>':'')
      +'<span class="week-stars-badge" id="wsb-'+w+'">'+wd*STARS_PER+' &#11088;</span>'
      +'<span class="week-done-badge" id="wdb-'+w+'" style="display:'+(wd===wk.days?'inline':'none')+'">&#10003; Done</span>';
    sec.appendChild(hdr);
    const grid=document.createElement('div');
    grid.className='days-grid';
    for(let d=0;d<wk.days;d++){
      const dateStr=addDays(wk.start,d);
      const isPast=dateStr<today;
      const isToday=dateStr===today;
      const isFuture=dateStr>today;
      const isDone=!!state[dayKey(w,d)];
      let cls='tap-btn';
      if(isDone) cls+=' done';
      else if(isPast) cls+=' locked-past';
      else if(isFuture) cls+=' locked-future';
      if(isToday && !isDone) cls+=' today-btn';
      const box=document.createElement('div');
      box.className='day-box';
      const btnText=isDone?'✓':'';
      box.innerHTML='<div class="day-name">'+DAY_NAMES[d]+'</div>'
        +'<div class="day-date">'+fmtShort(dateStr)+'</div>'
        +'<button class="'+cls+'" id="btn-'+w+'-'+d+'" onclick="toggle('+w+','+d+',this)" aria-label="'+wk.label+' '+DAY_NAMES[d]+'">'+btnText+'</button>';
      grid.appendChild(box);
    }
    sec.appendChild(grid);
    const wp=document.createElement('div');
    wp.className='week-prog';
    wp.innerHTML='<div class="week-prog-track"><div class="week-prog-fill" id="wpf-'+w+'" style="width:'+Math.round(wd/wk.days*100)+'%"></div></div>';
    sec.appendChild(wp);
    const exDiv=document.createElement('div');
    exDiv.className='ex-section';
    const exs=EXERCISES[w];
    let moveHtml='',powerHtml='';
    exs.forEach(function(ex){
      const tag=ex.carry?'<span class="carry-tag">carry-over</span>':'';
      const cls2='ex-item'+(ex.carry?' ex-carry':'');
      const dot=ex.type==='move'?'dot-move':'dot-power';
      const h='<div class="'+cls2+'"><span class="ex-dot '+dot+'"></span><span class="ex-name">'+ex.name+tag+'<span class="ex-cue">'+ex.cue+'</span></span><span class="ex-sets">'+ex.sets+'</span></div>';
      if(ex.type==='move') moveHtml+=h; else powerHtml+=h;
    });
    exDiv.innerHTML='<div class="ex-section-title">Movement skills</div><div class="ex-grid">'+moveHtml+'</div><div class="ex-section-title" style="margin-top:8px;">Rotational power</div><div class="ex-grid">'+powerHtml+'</div>';
    sec.appendChild(exDiv);
    container.appendChild(sec);
  });
}

/* ── PIN PAD ── */
let pinEntry='';
function pinPress(digit){
  if(pinEntry.length>=4) return;
  pinEntry+=digit;
  const disp=document.getElementById('pin-display');
  disp.textContent='•'.repeat(pinEntry.length)+'·'.repeat(4-pinEntry.length);
  disp.classList.add('active');
  if(pinEntry.length===4) setTimeout(checkPin,120);
}
function pinClear(){
  pinEntry='';
  const disp=document.getElementById('pin-display');
  disp.textContent='••••';
  disp.className='pin-display';
  document.getElementById('pin-msg').textContent='';
}
function checkPin(){
  const disp=document.getElementById('pin-display');
  const msg=document.getElementById('pin-msg');
  if(pinEntry==='5400'){
    /* reset today only */
    const today=todayStr();
    const cwi=currentWeekIdx();
    for(let d=0;d<WEEKS[cwi].days;d++){
      const dateStr=addDays(WEEKS[cwi].start,d);
      if(dateStr===today) delete state[dayKey(cwi,d)];
    }
    saveState(state);
    disp.className='pin-display success';
    disp.textContent='OK';
    msg.textContent="Today’s session cleared";
    refreshButtons();updateAll();
  } else if(pinEntry==='4110'){
    /* reset current week */
    const cwi=currentWeekIdx();
    for(let d=0;d<WEEKS[cwi].days;d++) delete state[dayKey(cwi,d)];
    saveState(state);
    disp.className='pin-display success';
    disp.textContent='OK';
    msg.textContent="This week cleared";
    refreshButtons();updateAll();
  } else if(pinEntry==='9110'){
    /* reset everything */
    const b=state._buckets||0;
    state={};
    state._buckets=b;
    saveState(state);
    disp.className='pin-display success';
    disp.textContent='OK';
    msg.textContent="All sessions cleared";
    refreshButtons();updateAll();
  } else {
    disp.className='pin-display error';
    disp.textContent='NOPE';
    disp.classList.add('shake');
    msg.textContent="Wrong code";
    disp.addEventListener('animationend',()=>disp.classList.remove('shake'),{once:true});
  }
  pinEntry='';
  setTimeout(()=>{
    disp.className='pin-display';
    disp.textContent='••••';
    msg.textContent='';
  },1800);
}
function refreshButtons(){
  const today=todayStr();
  for(let w=0;w<WEEKS.length;w++){
    for(let d=0;d<WEEKS[w].days;d++){
      const btn=document.getElementById('btn-'+w+'-'+d);
      if(!btn) continue;
      const dateStr=addDays(WEEKS[w].start,d);
      const isDone=!!state[dayKey(w,d)];
      const isPast=dateStr<today;
      const isToday=dateStr===today;
      const isFuture=dateStr>today;
      btn.className='tap-btn';
      if(isDone){btn.classList.add('done');btn.textContent='✓';}
      else{
        btn.textContent='';
        if(isPast) btn.classList.add('locked-past');
        else if(isFuture) btn.classList.add('locked-future');
        if(isToday && !isDone) btn.classList.add('today-btn');
      }
    }
  }
}

buildWeeks();
updateAll();
setTimeout(function(){
  const el=document.getElementById('week-'+currentWeekIdx());
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
},200);
</script>
